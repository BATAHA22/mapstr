version: 2

project_name: mapstr

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - main: .
    binary: mapstr
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/BATAHA22/mapstr/cmd.Version={{.Version}}

archives:
  - format: tar.gz
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: 'checksums.txt'
  algorithm: sha256

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^ci:'
      - '^chore:'

brews:
  - repository:
      owner: mapstr
      name: homebrew-tap
    directory: Formula
    homepage: https://github.com/mapstr/mapstr
    description: AI-Powered Codebase Navigator
    license: MIT
    test: |
      system "#{bin}/mapstr", "--version"

nfpms:
  - package_name: mapstr
    homepage: https://github.com/mapstr/mapstr
    description: AI-Powered Codebase Navigator
    license: MIT
    formats:
      - deb
      - rpm
